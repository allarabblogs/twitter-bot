<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتبة مرجع التدوين</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Tahoma,Arial,sans-serif;background:#f7f7f5;color:#1a1a1a;min-height:100vh;direction:rtl}
.top-bar{background:#fff;border-bottom:1px solid #e5e5e5;padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.avatar{width:38px;height:38px;border-radius:50%;background:#1DA1F2;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.avatar svg{width:20px;height:20px;fill:#fff}
.top-bar-text h1{font-size:16px;font-weight:600;color:#1a1a1a}
.top-bar-text .subtitle{font-size:12px;color:#888;line-height:1.5}
.top-bar-text .load-note{font-size:11px;color:#bbb;margin-top:2px}
.live-badge{margin-left:auto;display:flex;align-items:center;gap:5px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:999px;padding:3px 10px}
.live-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
.live-label{font-size:12px;color:#16a34a;font-weight:500}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.container{max-width:700px;margin:0 auto;padding:20px 14px}
.search-box{background:#fff;border-radius:16px;border:1px solid #e5e5e5;padding:18px;margin-bottom:14px}
.search-row{display:flex;gap:8px;margin-bottom:10px}
.search-row input{flex:1;border:1px solid #e5e5e5;border-radius:10px;padding:10px 14px;font-size:15px;outline:none;background:#f7f7f5;transition:border .15s;font-family:inherit;text-align:right;direction:rtl}
.search-row input:focus{border-color:#1DA1F2;background:#fff}
.search-row button{background:#1DA1F2;color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;transition:background .15s;flex-shrink:0}
.search-row button:hover{background:#0d8fd8}
.search-row button:disabled{background:#b0d8f5;cursor:not-allowed}
.filter-row{display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{font-size:13px;padding:7px 14px;border-radius:999px;background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;cursor:pointer;font-family:inherit;font-weight:500;transition:background .15s}
.filter-btn:hover{background:#dbeafe}
.filter-btn.active{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.subs-card{background:#fff;border-radius:16px;border:1px solid #e5e5e5;padding:18px;text-align:right}
.subs-title{font-size:16px;font-weight:600;margin-bottom:6px}
.subs-count{font-size:13px;color:#16a34a;margin-bottom:14px}
.subs-list{display:flex;flex-direction:column;gap:2px}
.subs-grid{display:flex;flex-wrap:wrap;gap:8px}
.sub-btn{font-size:14px;padding:9px 16px;border-radius:10px;background:#f7f7f5;border:1px solid #e5e5e5;color:#1a1a1a;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.sub-btn:hover{background:#1DA1F2;color:#fff;border-color:#1DA1F2}
.stats{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;justify-content:flex-end}
.stat{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:8px 14px;font-size:13px;color:#888;text-align:right}
.stat strong{color:#1a1a1a;font-weight:600}
.ai-card{background:#fff;border-radius:16px;border:1px solid #e5e5e5;padding:18px;margin-bottom:14px;text-align:right}
.ai-label{font-size:11px;color:#aaa;margin-bottom:8px}
.ai-text{font-size:15px;line-height:1.9;color:#1a1a1a}
.results-label{font-size:13px;color:#888;margin-bottom:10px;text-align:right}
.tweet-card{background:#fff;border-radius:14px;border:1px solid #e5e5e5;padding:15px 17px;margin-bottom:9px;text-align:right}
.tweet-card:hover{border-color:#1DA1F2}
.tweet-text{font-size:15px;line-height:1.75;color:#1a1a1a;margin-bottom:9px;word-break:break-word}
.tweet-meta{font-size:12px;color:#aaa;display:flex;gap:12px;flex-wrap:wrap;justify-content:flex-end;align-items:center}
.tweet-meta a{color:#1DA1F2;text-decoration:none}
.tweet-meta a:hover{text-decoration:underline}
.source-badge{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:500}
.badge-rss{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.badge-archive{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.loading{text-align:center;padding:40px;color:#aaa;font-size:14px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #e5e5e5;border-top-color:#1DA1F2;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px;color:#aaa;font-size:14px}
.error-msg{background:#fff5f5;border:1px solid #fecaca;border-radius:10px;padding:12px 16px;font-size:13px;color:#b91c1c;margin-bottom:14px;text-align:right}
.init-msg{text-align:center;padding:50px 20px;color:#aaa;font-size:14px}
.init-msg .big{font-size:36px;margin-bottom:10px}
.loading-steps{font-size:13px;color:#aaa;margin-top:8px}
footer{text-align:center;padding:30px 16px 16px;font-size:12px;color:#ccc}
@media(max-width:500px){.top-bar{padding:12px 14px}.container{padding:14px 10px}}
</style>
</head>
<body>
<div class="top-bar">
  <div class="avatar">
    <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.741l7.732-8.858L1.254 2.25H8.08l4.253 5.622 5.911-5.622z"/></svg>
  </div>
  <div class="top-bar-text">
    <h1>مكتبة مرجع التدوين</h1>
    <p class="subtitle">هنا مكتبة مرجع التدوين، ابحث عن أي موضوع تودّ الاطلاع عليه أكثر وستجد مدونات تجاوبك عنه.</p>
    <p id="load-status" class="load-note">جاري تحميل التغريدات...</p>
  </div>
  <div class="live-badge">
    <div class="live-dot"></div>
    <span class="live-label">مباشر</span>
  </div>
</div>

<div class="container">
  <div class="stats" id="stats" style="display:none"></div>
  <div class="search-box">
    <div class="search-row">
      <input type="text" id="search-input" placeholder="ابحث بأي كلمة أو معنى..." />
      <button id="search-btn" onclick="doSearch()" disabled>🔍 بحث</button>
    </div>
    <div class="filter-row">
      <button class="filter-btn" id="filter-0" onclick="toggleFilter(0)">📰 نشرة مرجع التدوين</button>
      <button class="filter-btn" id="subs-btn" onclick="showSubscribers()">📺 مشتركين تلفزيون المرجع</button>
    </div>
    <div id="filter-status" style="display:none;font-size:12px;color:#1d4ed8;margin-top:8px;text-align:right"></div>
  </div>
  <div id="main-area">
    <div class="loading"><div class="spinner"></div><br>جاري تحميل المنشورات...</div>
  </div>
</div>

<footer>مكتبة مرجع التدوين · @Allarabblogs · بحث ذكي بالذكاء الاصطناعي</footer>

<script>

let archiveTweets = [];
let rssTweets = [];


const FILTERS=['نشرة مرجع التدوين','مشتركين تلفزيون المرجع'];
let activeFilter=-1;

function toggleFilter(idx){
  activeFilter=(activeFilter===idx)?-1:idx;
  const btn=document.getElementById('filter-'+idx);
  if(activeFilter===idx){btn.classList.add('active');}else{btn.classList.remove('active');}
  const status=document.getElementById('filter-status');
  if(activeFilter>=0){
    status.style.display='block';
    status.textContent='تصفية مفعلة: '+FILTERS[activeFilter]+' — البحث الآن داخل هذه الفئة فقط';
    document.getElementById('search-input').placeholder='ابحث داخل '+FILTERS[activeFilter]+'...';
    showFilteredCategory();
  }else{
    status.style.display='none';
    document.getElementById('search-input').placeholder='ابحث بأي كلمة أو معنى...';
  }
}

async function showSubscribers(){
  const main=document.getElementById('main-area');
  main.innerHTML='<div class="loading"><div class="spinner"></div><br>جاري تحميل قائمة المشتركين...</div>';
  try{
    const res=await fetch('subscribers.txt');
    if(!res.ok)throw new Error('not found');
    const text=await res.text();
    const subs=text.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#')).map(l=>{
      const parts=l.split('|').map(p=>p.trim());
      return {name:parts[0]||'',handle:parts[1]||''};
    }).filter(s=>s.name);
    const safe=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    let html='<div class="subs-card"><h2 class="subs-title">📺 مشتركو تلفزيون المرجع النشطون</h2>';
    if(!subs.length){
      html+='<div style="text-align:center;color:#aaa;padding:20px;font-size:14px">لا يوجد مشتركون حالياً</div>';
    }else{
      html+=`<div class="subs-count">${subs.length} مشترك نشط — اضغط على اسم المشترك لعرض تغريداته</div><div class="subs-grid">`;
      window._subs=subs;
      subs.forEach((s,i)=>{
        html+=`<button class="sub-btn" onclick="searchSubscriber(${i})">${safe(s.name)}</button>`;
      });
      html+='</div>';
    }
    html+='</div>';
    main.innerHTML=html;
  }catch(e){
    main.innerHTML='<div class="error-msg">⚠️ تعذر تحميل قائمة المشتركين</div>';
  }
}

function searchSubscriber(i){
  const s=(window._subs||[])[i];
  if(!s||!s.handle){alert('لا يوجد معرف لهذا المشترك');return;}
  activeFilter=-1;
  document.getElementById('filter-0').classList.remove('active');
  document.getElementById('filter-status').style.display='none';
  document.getElementById('search-input').value=s.handle;
  doSearch();
}

function getFilteredPool(){
  const allTweets=[...rssTweets,...archiveTweets];
  if(activeFilter<0)return allTweets;
  const f=normalize(FILTERS[activeFilter]);
  return allTweets.filter(t=>normalize(t.text).includes(f));
}

function showFilteredCategory(){
  const pool=getFilteredPool();
  const sorted=[...pool].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,30);
  const allTweets=[...rssTweets,...archiveTweets];
  renderResults(FILTERS[activeFilter],sorted,pool.length,'');
  const aiBox=document.getElementById('ai-box');
  if(aiBox)aiBox.style.display='none';
}

function updateStats(){
  const el=document.getElementById('stats');
  const total=archiveTweets.length+rssTweets.length;
  if(!total){el.style.display='none';return;}
  el.style.display='flex';
  el.innerHTML=`<div class="stat"><strong>${total.toLocaleString()}</strong> منشور</div>`;
  document.getElementById('search-btn').disabled=false;
  document.getElementById('load-status').textContent='Ready to search';
}

async function loadArchive(){
  try{
    const res=await fetch('tweets.json');
    const data=await res.json();
    archiveTweets=data.map(t=>({
      text:t.t, date:t.d, likes:t.l, retweets:t.r,
      link:t.i?`https://twitter.com/Allarabblogs/status/${t.i}`:'',
      source:'archive'
    })).sort((a,b)=>new Date(b.date)-new Date(a.date));
    updateStats();
  }catch(e){
    document.getElementById('load-status').textContent='Failed to load archive';
    console.warn(e);
  }
}

async function loadRSS(){
  try{
    const res=await fetch('/api/rss');
    const xml=new DOMParser().parseFromString(await res.text(),'text/xml');
    const items=xml.querySelectorAll('item');
    const seen=new Set(archiveTweets.map(t=>t.text.slice(0,30)));
    rssTweets=Array.from(items).map(item=>{
      const raw=item.querySelector('description')?.textContent||item.querySelector('title')?.textContent||'';
      const text=raw.replace(/<[^>]+>/g,'').replace(/https?:\/\/t\.co\/\S+/g,'').trim();
      return{text,date:item.querySelector('pubDate')?.textContent||'',likes:0,retweets:0,link:item.querySelector('link')?.textContent||'',source:'rss'};
    }).filter(t=>t.text.length>2&&!seen.has(t.text.slice(0,30)));
    updateStats();
  }catch(e){console.warn('RSS failed',e);}
}

function engagement(t){
  return (t.likes||0)+(t.retweets||0)*2;
}

function normalize(s){
  return s.replace(/[أإآا]/g,'ا').replace(/[ةه]/g,'ه').replace(/[يى]/g,'ي').replace(/[\u064B-\u065F]/g,'').toLowerCase().trim();
}

function keywordScore(tweet, normWords){
  const tn=normalize(tweet.text);
  let score=0;
  for(const w of normWords){
    if(!w||w.length<2)continue;
    if(tn.includes(w)){score+=10;score+=(tn.split(w).length-1);}
    else if(w.length>=4&&tn.includes(w.slice(0,Math.ceil(w.length*.75))))score+=4;
  }
  return score;
}

function formatDate(dateStr){
  if(!dateStr)return'';
  const d=new Date(dateStr);
  if(isNaN(d))return'';
  return d.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
}

async function doSearch(){
  const q=document.getElementById('search-input').value.trim();
  if(!q)return;
  const allTweets=getFilteredPool();
  if(!allTweets.length){
    document.getElementById('main-area').innerHTML=`<div class="error-msg">⚠️ Tweets not loaded yet. Please refresh the page.</div>`;
    return;
  }

  document.getElementById('search-btn').disabled=true;

  const words=q.split(/\s+/).filter(Boolean);
  const normWords=words.map(normalize);

  // STEP 1: Instant keyword search - always works
  const withScores=allTweets.map(t=>({...t,score:keywordScore(t,normWords)}));
  const keywordResults=withScores.filter(t=>t.score>0).sort((a,b)=>b.score-a.score).slice(0,30);
  const sorted=[...keywordResults].sort((a,b)=>new Date(b.date)-new Date(a.date));

  // Render keyword results immediately
  renderResults(q,sorted,allTweets.length,'<div class="loading" style="padding:14px"><div class="spinner" style="width:14px;height:14px"></div> AI is analyzing...</div>');
  document.getElementById('search-btn').disabled=false;

  // STEP 2: AI summary in background (does not block results)
  const tweetSample=keywordResults.slice(0,10).map(t=>t.text).join('\n---\n');
  try{
    const res=await fetch('/api/search',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({query:q,candidates:keywordResults.slice(0,40).map(t=>({text:t.text}))})
    });
    const data=await res.json();
    const summary=data.summary||data.error||'';
    const aiBox=document.getElementById('ai-box');
    if(aiBox&&summary){
      aiBox.innerHTML=`<div class="ai-label">✦ AI Analysis</div><div class="ai-text">${summary}</div>`;
    } else if(aiBox){
      aiBox.style.display='none';
    }
  }catch(e){
    const aiBox=document.getElementById('ai-box');
    if(aiBox)aiBox.style.display='none';
    console.error('AI failed:',e);
  }
}

function renderResults(q,results,total,aiPlaceholder){
  let html=`<div class="ai-card" id="ai-box">${aiPlaceholder}</div>`;
  if(!results.length){
    html+=`<div class="empty">No tweets found for "<strong>${q}</strong>"<br><span style="font-size:12px;margin-top:6px;display:block">Try different or shorter words</span></div>`;
  }else{
    html+=`<div class="results-label">${results.length} matching tweets from ${total.toLocaleString()} total</div>`;
    results.forEach(t=>{
      const date=formatDate(t.date);
      const badge=t.source==='rss'
        ?`<span class="source-badge badge-rss">New</span>`
        :`<span class="source-badge badge-archive">Archive</span>`;
      const link=t.link?`<a href="${t.link}" target="_blank" rel="noopener">View ↗</a>`:'';
      html+=`<div class="tweet-card">
        <div class="tweet-text">${t.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
        <div class="tweet-meta">${badge}${date?`<span>${date}</span>`:''}${t.likes?`<span>♥ ${t.likes.toLocaleString()}</span>`:''}${t.retweets?`<span>🔁 ${t.retweets.toLocaleString()}</span>`:''}${link}</div>
      </div>`;
    });
  }
  document.getElementById('main-area').innerHTML=html;
}

document.getElementById('search-input').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
let subscribersList=[];
let defaultFeedShown=false;

async function loadSubscribersList(){
  try{
    const res=await fetch('subscribers.txt');
    if(!res.ok)return;
    const text=await res.text();
    subscribersList=text.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#')).map(l=>{
      const parts=l.split('|').map(p=>p.trim());
      return {name:parts[0]||'',handle:parts[1]||''};
    }).filter(s=>s.handle);
  }catch(e){console.warn('subscribers load failed',e);}
}

function showDefaultFeed(){
  if(defaultFeedShown)return;
  const allTweets=[...rssTweets,...archiveTweets];
  if(!allTweets.length||!subscribersList.length)return;
  defaultFeedShown=true;
  const handles=subscribersList.map(s=>normalize(s.handle.replace('@','')));
  const feed=allTweets.filter(t=>{
    const tn=normalize(t.text);
    return handles.some(h=>h&&tn.includes(h));
  }).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,30);
  if(!feed.length){
    document.getElementById('main-area').innerHTML=`<div class="init-msg"><div class="big">🔍</div>ابحث عن أي موضوع تودّ الاطلاع عليه أكثر<br><span style="font-size:13px;margin-top:6px;display:block">وستجد مدونات تجاوبك عنه</span></div>`;
    return;
  }
  renderResults('',feed,allTweets.length,'');
  const aiBox=document.getElementById('ai-box');
  if(aiBox)aiBox.style.display='none';
  const label=document.querySelector('.results-label');
  if(label)label.textContent='آخر المنشورات عن مشتركي تلفزيون المرجع';
}

async function init(){
  await loadSubscribersList();
  await loadArchive();
  showDefaultFeed();
  await loadRSS();
  showDefaultFeed();
}
init();
setInterval(loadRSS,15*60*1000);

</script>
</body>
</html>

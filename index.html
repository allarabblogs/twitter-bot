
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوت بحث تغريدات @Allarabblogs</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Tahoma,Arial,sans-serif;background:#f7f7f5;color:#1a1a1a;min-height:100vh;direction:rtl}
.top-bar{background:#fff;border-bottom:1px solid #e5e5e5;padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.avatar{width:38px;height:38px;border-radius:50%;background:#1DA1F2;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.avatar svg{width:20px;height:20px;fill:#fff}
.top-bar-text h1{font-size:16px;font-weight:600;color:#1a1a1a}
.top-bar-text p{font-size:12px;color:#888}
.live-badge{margin-left:auto;display:flex;align-items:center;gap:5px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:999px;padding:3px 10px}
.live-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
.live-label{font-size:12px;color:#16a34a;font-weight:500}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.container{max-width:700px;margin:0 auto;padding:20px 14px}
.search-box{background:#fff;border-radius:16px;border:1px solid #e5e5e5;padding:18px;margin-bottom:14px}
.search-row{display:flex;gap:8px;margin-bottom:10px}
.search-row input{flex:1;border:1px solid #e5e5e5;border-radius:10px;padding:10px 14px;font-size:15px;outline:none;background:#f7f7f5;transition:border .15s;font-family:inherit;text-align:right;direction:rtl}
.search-row input:focus{border-color:#1DA1F2;background:#fff}
.search-row button{background:#1DA1F2;color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;transition:background .15s;flex-shrink:0}
.search-row button:hover{background:#0d8fd8}
.search-row button:disabled{background:#b0d8f5;cursor:not-allowed}
.recent-label{font-size:11px;color:#aaa;margin-bottom:6px;text-align:right}
.recent-tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-end}
.tag{font-size:13px;padding:4px 12px;border-radius:999px;background:#f0f0f0;border:1px solid #e5e5e5;color:#555;cursor:pointer;font-family:inherit}
.tag:hover{background:#e5e5e5}
.stats{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;justify-content:flex-end}
.stat{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:8px 14px;font-size:13px;color:#888;text-align:right}
.stat strong{color:#1a1a1a;font-weight:600}
.ai-card{background:#fff;border-radius:16px;border:1px solid #e5e5e5;padding:18px;margin-bottom:14px;text-align:right}
.ai-label{font-size:11px;color:#aaa;margin-bottom:8px}
.ai-text{font-size:15px;line-height:1.9;color:#1a1a1a}
.results-label{font-size:13px;color:#888;margin-bottom:10px;text-align:right}
.tweet-card{background:#fff;border-radius:14px;border:1px solid #e5e5e5;padding:15px 17px;margin-bottom:9px;text-align:right}
.tweet-card:hover{border-color:#1DA1F2}
.tweet-text{font-size:15px;line-height:1.75;color:#1a1a1a;margin-bottom:9px;word-break:break-word}
.tweet-text mark{background:#fef9c3;color:#854f0b;border-radius:2px;padding:0 2px}
.tweet-meta{font-size:12px;color:#aaa;display:flex;gap:12px;flex-wrap:wrap;justify-content:flex-end;align-items:center}
.tweet-meta a{color:#1DA1F2;text-decoration:none}
.tweet-meta a:hover{text-decoration:underline}
.source-badge{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:500}
.badge-rss{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.badge-archive{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.loading{text-align:center;padding:40px;color:#aaa;font-size:14px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #e5e5e5;border-top-color:#1DA1F2;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px;color:#aaa;font-size:14px}
.error-msg{background:#fff5f5;border:1px solid #fecaca;border-radius:10px;padding:12px 16px;font-size:13px;color:#b91c1c;margin-bottom:14px;text-align:right}
.rate-msg{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:12px 16px;font-size:13px;color:#92400e;margin-bottom:14px;text-align:right}
.init-msg{text-align:center;padding:50px 20px;color:#aaa;font-size:14px}
.init-msg .big{font-size:36px;margin-bottom:10px}
footer{text-align:center;padding:30px 16px 16px;font-size:12px;color:#ccc}
@media(max-width:500px){.top-bar{padding:12px 14px}.container{padding:14px 10px}}
</style>
</head>
<body>
<div class="top-bar">
  <div class="avatar">
    <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.741l7.732-8.858L1.254 2.25H8.08l4.253 5.622 5.911-5.622z"/></svg>
  </div>
  <div class="top-bar-text">
    <h1>بحث تغريدات @Allarabblogs</h1>
    <p id="load-status">جاري تحميل التغريدات...</p>
  </div>
  <div class="live-badge">
    <div class="live-dot"></div>
    <span class="live-label">مباشر</span>
  </div>
</div>

<div class="container">
  <div class="stats" id="stats" style="display:none"></div>
  <div class="search-box">
    <div class="search-row">
      <input type="text" id="search-input" placeholder="ابحث في كل التغريدات..." />
      <button id="search-btn" onclick="doSearch()" disabled>🔍 بحث</button>
    </div>
    <div id="recent-wrap" style="display:none">
      <div class="recent-label">بحث سابق</div>
      <div class="recent-tags" id="recent-tags"></div>
    </div>
  </div>
  <div id="main-area">
    <div class="init-msg">
      <div class="big">🔍</div>
      ابحث في أكثر من 7000 تغريدة من @Allarabblogs
    </div>
  </div>
</div>

<footer>@Allarabblogs · أرشيف كامل + تغريدات جديدة · مدعوم بالذكاء الاصطناعي</footer>

<script>
const RSS_URL = 'https://rss.app/feeds/9LWsg1jyV44TVKCX.xml';
const CORS = 'https://api.allorigins.win/get?url=';
const MAX_PER_DAY = 10;

let archiveTweets = [];
let rssTweets = [];
let recentSearches = [];
try { recentSearches = JSON.parse(localStorage.getItem('tbot_recent')||'[]'); } catch(e){}

function getRateData(){
  try{const d=JSON.parse(localStorage.getItem('tbot_rate')||'{}');const today=new Date().toDateString();if(d.date!==today)return{date:today,count:0};return d;}
  catch(e){return{date:new Date().toDateString(),count:0};}
}
function bumpRate(){const d=getRateData();d.count++;try{localStorage.setItem('tbot_rate',JSON.stringify(d));}catch(e){}}
function isRateLimited(){return getRateData().count>=MAX_PER_DAY;}

function renderRecent(){
  if(!recentSearches.length){document.getElementById('recent-wrap').style.display='none';return;}
  document.getElementById('recent-wrap').style.display='block';
  document.getElementById('recent-tags').innerHTML=recentSearches.slice(0,8).map(q=>`<span class="tag" onclick="fillSearch(${JSON.stringify(q)})">${q}</span>`).join('');
}
function fillSearch(q){document.getElementById('search-input').value=q;doSearch();}
function addRecent(q){
  recentSearches=[q,...recentSearches.filter(r=>r!==q)].slice(0,8);
  try{localStorage.setItem('tbot_recent',JSON.stringify(recentSearches));}catch(e){}
  renderRecent();
}

function updateStats(){
  const el=document.getElementById('stats');
  const total=archiveTweets.length+rssTweets.length;
  if(!total){el.style.display='none';return;}
  el.style.display='flex';
  let html='';
  if(archiveTweets.length) html+=`<div class="stat"><strong>${archiveTweets.length.toLocaleString()}</strong> تغريدة أرشيف</div>`;
  if(rssTweets.length) html+=`<div class="stat"><strong>${rssTweets.length.toLocaleString()}</strong> تغريدة جديدة</div>`;
  html+=`<div class="stat">المجموع <strong>${total.toLocaleString()}</strong></div>`;
  el.innerHTML=html;
  document.getElementById('search-btn').disabled=false;
  document.getElementById('load-status').textContent='جاهز للبحث';
}

async function loadArchive(){
  try{
    const res=await fetch('tweets.json');
    const data=await res.json();
    archiveTweets=data.map(t=>({text:t.t,date:t.d,likes:t.l,retweets:t.r,link:t.i?`https://twitter.com/Allarabblogs/status/${t.i}`:'',source:'archive'})).sort((a,b)=>new Date(b.date)-new Date(a.date));
    updateStats();
  }catch(e){document.getElementById('load-status').textContent='تعذر تحميل الأرشيف';console.warn(e);}
}

async function loadRSS(){
  try{
    const res=await fetch(CORS+encodeURIComponent(RSS_URL));
    const json=await res.json();
    const xml=new DOMParser().parseFromString(json.contents,'text/xml');
    const items=xml.querySelectorAll('item');
    const seen=new Set(archiveTweets.map(t=>t.text.slice(0,30)));
    rssTweets=Array.from(items).map(item=>{
      const raw=item.querySelector('description')?.textContent||item.querySelector('title')?.textContent||'';
      const text=raw.replace(/<[^>]+>/g,'').replace(/https?:\/\/t\.co\/\S+/g,'').trim();
      return{text,date:item.querySelector('pubDate')?.textContent||'',likes:0,retweets:0,link:item.querySelector('link')?.textContent||'',source:'rss'};
    }).filter(t=>t.text.length>2&&!seen.has(t.text.slice(0,30)));
    updateStats();
  }catch(e){console.warn('RSS failed',e);}
}

function normalize(s){
  return s.replace(/[أإآا]/g,'ا').replace(/[ةه]/g,'ه').replace(/[يى]/g,'ي').replace(/[\u064B-\u065F]/g,'').toLowerCase().trim();
}

function scoreMatch(tweet,normWords){
  const tn=normalize(tweet.text);
  let score=0;
  for(const w of normWords){
    if(!w||w.length<2)continue;
    if(tn.includes(w)){score+=10;score+=(tn.split(w).length-1);}
    else if(w.length>=4&&tn.includes(w.slice(0,Math.ceil(w.length*.75))))score+=4;
  }
  return score;
}

function highlight(text,words){
  let out=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  for(const w of words){
    if(!w||w.length<2)continue;
    const re=new RegExp('('+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    out=out.replace(re,'<mark>$1</mark>');
  }
  return out;
}

async function doSearch(){
  const q=document.getElementById('search-input').value.trim();
  if(!q)return;
  if(isRateLimited()){document.getElementById('main-area').innerHTML=`<div class="rate-msg">⏳ وصلت إلى الحد اليومي (${MAX_PER_DAY} عمليات بحث). عد غداً!</div>`;return;}
  const allTweets=[...rssTweets,...archiveTweets];
  if(!allTweets.length){document.getElementById('main-area').innerHTML=`<div class="error-msg">⚠️ لم يتم تحميل التغريدات بعد. أعد تحميل الصفحة.</div>`;return;}
  addRecent(q);bumpRate();
  document.getElementById('search-btn').disabled=true;
  document.getElementById('main-area').innerHTML=`<div class="loading"><div class="spinner"></div><br>جاري البحث في ${allTweets.length.toLocaleString()} تغريدة...</div>`;
  const words=q.split(/\s+/).filter(Boolean);
  const normWords=words.map(normalize);
  const scored=allTweets.map(t=>({...t,score:scoreMatch(t,normWords)})).filter(t=>t.score>0).sort((a,b)=>b.score-a.score||new Date(b.date)-new Date(a.date)).slice(0,20);
  const tweetSample=scored.slice(0,8).map(t=>t.text).join('\n---\n');

  let aiAnswer='';
  try{
    const res=await fetch('/api/search',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({query:q,tweets:tweetSample||'لا توجد نتائج مطابقة.'})
    });
    const data=await res.json();
    aiAnswer=data.answer||'';
  }catch(e){aiAnswer='تعذر الاتصال بالذكاء الاصطناعي.';}

  let html='';
  if(aiAnswer) html+=`<div class="ai-card"><div class="ai-label">✦ تحليل الذكاء الاصطناعي</div><div class="ai-text">${aiAnswer}</div></div>`;
  if(!scored.length){
    html+=`<div class="empty">لا توجد تغريدات مطابقة لـ "<strong>${q}</strong>"<br><span style="font-size:12px;margin-top:6px;display:block">جرّب كلمات مختلفة أو أقصر</span></div>`;
  }else{
    html+=`<div class="results-label">${scored.length} تغريدة مطابقة من أصل ${allTweets.length.toLocaleString()}</div>`;
    scored.forEach(t=>{
      const date=t.date?new Date(t.date).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}):'';
      const badge=t.source==='rss'?`<span class="source-badge badge-rss">جديد</span>`:`<span class="source-badge badge-archive">أرشيف</span>`;
      const link=t.link?`<a href="${t.link}" target="_blank" rel="noopener">عرض ↗</a>`:'';
      html+=`<div class="tweet-card"><div class="tweet-text">${highlight(t.text,words)}</div><div class="tweet-meta">${badge}${date?`<span>${date}</span>`:''}${t.likes?`<span>♥ ${t.likes.toLocaleString()}</span>`:''}${link}</div></div>`;
    });
  }
  document.getElementById('main-area').innerHTML=html;
  document.getElementById('search-btn').disabled=false;
}

document.getElementById('search-input').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
renderRecent();loadArchive();loadRSS();
setInterval(loadRSS,15*60*1000);
</script>
</body>
</html>
